name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task fmt:check
      - run: deno task lint
      - run: deno task check
      - run: deno task test
